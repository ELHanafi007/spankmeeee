<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROG STRIX SPANK - ULTIMATE EDITION</title>
    <style>
        :root {
            --rog-red: #ff0032;
            --rog-dark: #0f0f0f;
            --rog-grey: #1a1a1a;
            --rog-text: #ffffff;
        }

        body {
            background-color: var(--rog-dark);
            color: var(--rog-text);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        #bg-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ff003211 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            text-align: center;
            border: 2px solid var(--rog-red);
            padding: 40px;
            background: var(--rog-grey);
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.2);
            border-radius: 5px;
            position: relative;
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: var(--rog-red);
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 50, 0.5);
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-bottom: 30px;
            color: #aaa;
        }

        .spank-surface {
            width: 250px;
            height: 250px;
            border: 4px solid var(--rog-red);
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.1s;
            position: relative;
            background: linear-gradient(45deg, #111, #222);
        }

        .spank-surface:active {
            transform: scale(0.95);
            background: var(--rog-red);
        }

        .spank-surface i {
            font-size: 4rem;
            color: var(--rog-red);
        }

        .spank-surface:active i {
            color: white;
        }

        .rog-logo {
            width: 100px;
            margin-bottom: 20px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            background: transparent;
            border: 1px solid var(--rog-red);
            color: var(--rog-red);
            padding: 10px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: bold;
            transition: 0.3s;
        }

        button.active {
            background: var(--rog-red);
            color: white;
        }

        button:hover {
            background: rgba(255, 0, 50, 0.1);
        }

        .stats {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #888;
        }

        .intensity-bar {
            width: 100%;
            height: 10px;
            background: #222;
            margin-top: 10px;
            position: relative;
        }

        .intensity-fill {
            height: 100%;
            background: var(--rog-red);
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px var(--rog-red);
        }

        #status-msg {
            margin-top: 15px;
            color: var(--rog-red);
            font-weight: bold;
            height: 20px;
        }

        .setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--rog-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .start-btn {
            padding: 20px 50px;
            font-size: 1.5rem;
            border: 2px solid var(--rog-red);
            background: transparent;
            color: var(--rog-red);
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 50, 0.3);
        }

        .start-btn:hover {
            background: var(--rog-red);
            color: white;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .shaking {
            animation: shake 0.2s;
        }
    </style>
</head>
<body>
    <div id="bg-effect"></div>

    <div id="setup" class="setup-overlay">
        <h1 style="margin-bottom: 50px;">ROG STRIX OPTIMIZER</h1>
        <p style="color: #666; margin-bottom: 30px; text-align: center; max-width: 400px;">
            This application requires microphone access to detect physical interactions with your ROG hardware.
        </p>
        <button class="start-btn" onclick="init()">INITIALIZE SYSTEM</button>
    </div>

    <div class="container" id="main-ui">
        <div class="subtitle">Republic of Gamers | Spank Edition</div>
        <h1>ROG SPANKER v2.0</h1>
        
        <div class="spank-surface" id="target" onclick="manualSpank()">
            <svg viewBox="0 0 24 24" width="80" height="80" fill="var(--rog-red)">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,6A6,6 0 0,0 6,12A6,6 0 0,0 12,18A6,6 0 0,0 18,12A6,6 0 0,0 12,6M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8Z" />
            </svg>
        </div>

        <div class="controls">
            <button id="btn-sexy" onclick="setMode('sexy')" class="active">SEXY MODE</button>
            <button id="btn-pain" onclick="setMode('pain')">PAIN MODE</button>
            <button id="btn-halo" onclick="setMode('halo')">HALO MODE</button>
        </div>

        <div class="stats">
            TOTAL SPANKS: <span id="count">0</span> | INTENSITY
            <div class="intensity-bar">
                <div class="intensity-fill" id="intensity"></div>
            </div>
        </div>

        <div id="status-msg">SYSTEM READY</div>
        <p style="font-size: 0.6rem; color: #444; margin-top: 20px;">
            OPTIMIZED FOR ASUS ROG STRIX G15 HARDWARE
        </p>
    </div>

    <script>
        let mode = 'sexy';
        let totalSpanks = 0;
        let score = 0;
        let lastTime = 0;
        let cooldown = 600; // ms
        let lastSpankTime = 0;
        
        const decayHalfLife = 30; // seconds
        const statusMsg = document.getElementById('status-msg');
        const countDisplay = document.getElementById('count');
        const intensityFill = document.getElementById('intensity');
        const target = document.getElementById('target');

        const sexyMessages = [
            "😏 Ooh yeah...", "😳 Mmm harder!", "😈 Right there!", 
            "🥴 Don't stop!", "😫 I'm getting close!", "🤤 Yes yes YES!", 
            "😱 OH GOD!", "💦 I'M CUMMING!", "😵‍💫 That's the spot!", "🥵 More!"
        ];

        const painMessages = [
            "😫 OW!", "💢 STOP!", "😭 WHY?", "😡 HEY!", "🥺 Ouchie"
        ];

        function setMode(newMode) {
            mode = newMode;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + newMode).classList.add('active');
            statusMsg.innerText = mode.toUpperCase() + " MODE ACTIVE";
        }

        function playSound(path) {
            const audio = new Audio(path);
            audio.play().catch(e => console.error("Audio play failed", e));
        }

        function spank(amplitude = 1) {
            const now = Date.now();
            if (now - lastSpankTime < cooldown) return;
            
            lastSpankTime = now;
            totalSpanks++;
            
            // Escalation logic
            if (lastTime > 0) {
                const elapsed = (now - lastTime) / 1000;
                score *= Math.pow(0.5, elapsed / decayHalfLife);
            }
            score += 1.0;
            lastTime = now;

            // Visual feedback
            countDisplay.innerText = totalSpanks;
            target.classList.add('shaking');
            setTimeout(() => target.classList.remove('shaking'), 200);
            
            // Update intensity bar (max around 15 score)
            const intensity = Math.min(100, (score / 15) * 100);
            intensityFill.style.width = intensity + "%";

            // Play response
            if (mode === 'sexy') {
                const idx = Math.min(59, Math.floor(score * 4));
                const padIdx = idx.toString().padStart(2, '0');
                playSound(`audio/sexy/${padIdx}.mp3`);
                statusMsg.innerText = sexyMessages[Math.floor(Math.random() * sexyMessages.length)];
            } else if (mode === 'pain') {
                const idx = Math.floor(Math.random() * 10);
                const painFiles = [
                    "00_Ow.mp3", "01_Ouch.mp3", "02_Owwie.mp3", 
                    "03_Hey_that_hurts.mp3", "04_Ow_stop_it.mp3", 
                    "05_What_was_that_for.mp3", "06_Ow_ow_ow.mp3", 
                    "07_Hey.mp3", "08_Yowch.mp3", "09_That_stings.mp3"
                ];
                playSound(`audio/pain/${painFiles[idx]}`);
                statusMsg.innerText = painMessages[Math.floor(Math.random() * painMessages.length)];
            } else if (mode === 'halo') {
                const idx = Math.floor(Math.random() * 9).toString().padStart(2, '0');
                playSound(`audio/halo/${idx}.mp3`);
                statusMsg.innerText = "SQUAD DOWN!";
            }
        }

        function manualSpank() {
            spank(1.0);
        }

        async function init() {
            document.getElementById('setup').style.display = 'none';
            
            // Initialize Microphone Spank Detection
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const analyzer = audioContext.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);

                const dataArray = new Uint8Array(analyzer.frequencyBinCount);
                
                function checkAudio() {
                    analyzer.getByteFrequencyData(dataArray);
                    let sum = 0;
                    for(let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                    const average = sum / dataArray.length;

                    // Detection threshold for a "slap" (sudden peak)
                    // High frequencies are usually more prominent in a chassis slap
                    const highFreqSum = dataArray.slice(32).reduce((a, b) => a + b, 0);
                    if (highFreqSum > 1500) { // Adjust threshold as needed
                        spank(highFreqSum / 2000);
                    }
                    
                    requestAnimationFrame(checkAudio);
                }
                checkAudio();
                statusMsg.innerText = "MIC SENSORS ONLINE";
            } catch (err) {
                console.warn("Microphone access denied", err);
                statusMsg.innerText = "MIC DISABLED - CLICK TO SPANK";
            }
        }
    </script>
</body>
</html>
