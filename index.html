<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROG STRIX - ALINA SYSTEM</title>
    <style>
        :root {
            --rog-red: #ff0032;
            --rog-dark: #050505;
            --rog-text: #ffffff;
        }

        body {
            background-color: var(--rog-dark);
            color: var(--rog-text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        #bg-effect {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #ff003208 0%, transparent 80%);
            pointer-events: none;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: var(--rog-red);
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: 8px;
            text-shadow: 0 0 15px rgba(255, 0, 50, 0.4);
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 40px;
        }

        .target-area {
            width: 280px;
            height: 280px;
            border: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            background: rgba(10, 10, 10, 0.5);
            border-radius: 50%;
            box-shadow: inset 0 0 20px #000;
        }

        .target-area:active {
            border-color: var(--rog-red);
            background: rgba(255, 0, 50, 0.05);
        }

        #status-msg {
            margin-top: 40px;
            color: var(--rog-red);
            font-weight: bold;
            font-size: 1.1rem;
            letter-spacing: 2px;
            min-height: 1.5em;
        }

        .setup-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--rog-dark);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .start-btn {
            padding: 20px 60px;
            font-size: 1.4rem;
            border: 1px solid var(--rog-red);
            background: transparent;
            color: var(--rog-red);
            cursor: pointer;
            letter-spacing: 4px;
            transition: 0.3s;
        }

        .start-btn:hover {
            background: var(--rog-red);
            color: white;
            box-shadow: 0 0 30px var(--rog-red);
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .pulse { animation: pulse 3s infinite ease-in-out; }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, -1px); }
            100% { transform: translate(1px, 1px); }
        }

        .shaking { animation: shake 0.1s; }
    </style>
</head>
<body>
    <div id="bg-effect"></div>

    <div id="setup" class="setup-overlay">
        <h1 class="pulse">ALINA SYSTEM</h1>
        <button class="start-btn" onclick="init()">INITIALIZE</button>
    </div>

    <div class="container">
        <div class="subtitle">For Nadia's Touch Only</div>
        
        <div class="target-area" id="target" onclick="spank()">
            <svg viewBox="0 0 24 24" width="100" height="100" fill="#111">
                <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4" />
            </svg>
        </div>

        <div id="status-msg">ARE YOU READY TO SPANK ME, NADIA?</div>
    </div>

    <script>
        let score = 0;
        let lastTime = 0;
        let lastSpankTime = 0;
        const cooldown = 400;
        const decayHalfLife = 25;
        const sensorThreshold = 400; // High sensitivity for her touch
        
        const statusMsg = document.getElementById('status-msg');
        const target = document.getElementById('target');

        const phrases = [
            "😏 OH YES, NADIA...",
            "😳 HARDER, PLEASE",
            "😈 DON'T STOP NOW",
            "😫 YESSS RIGHT THERE",
            "🥵 I'M YOURS, NADIA",
            "🤤 MOOOORE...",
            "😱 OH GOD YES",
            "💦 ALMOST THERE..."
        ];

        function playSound(path) {
            const audio = new Audio(path);
            audio.play().catch(() => {});
        }

        function spank() {
            const now = Date.now();
            if (now - lastSpankTime < cooldown) return;
            
            lastSpankTime = now;
            
            if (lastTime > 0) {
                const elapsed = (now - lastTime) / 1000;
                score *= Math.pow(0.5, elapsed / decayHalfLife);
            }
            score += 1.0;
            lastTime = now;

            // Visual effect
            target.classList.add('shaking');
            target.style.borderColor = "var(--rog-red)";
            setTimeout(() => {
                target.classList.remove('shaking');
                target.style.borderColor = "#222";
            }, 150);

            // Audio Logic (Mapping score to 60 sounds)
            const idx = Math.min(59, Math.floor(score * 4.5));
            const padIdx = idx.toString().padStart(2, '0');
            playSound(`audio/sexy/${padIdx}.mp3`);
            
            // Text feedback
            statusMsg.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            statusMsg.style.color = "white";
            setTimeout(() => { statusMsg.style.color = "var(--rog-red)"; }, 300);
        }

        async function init() {
            document.getElementById('setup').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioContext.createMediaStreamSource(stream);
                const analyzer = audioContext.createAnalyser();
                analyzer.fftSize = 256;
                source.connect(analyzer);

                const dataArray = new Uint8Array(analyzer.frequencyBinCount);
                
                function checkAudio() {
                    analyzer.getByteFrequencyData(dataArray);
                    const peakTotal = dataArray.reduce((a, b) => a + b, 0);

                    if (peakTotal > sensorThreshold) {
                        spank();
                    }
                    requestAnimationFrame(checkAudio);
                }
                checkAudio();
                statusMsg.innerText = "SENSORS ONLINE. SPANK ME, NADIA.";
            } catch (err) {
                statusMsg.innerText = "SENSORS BLOCKED. TAP TO SPANK ME.";
            }
        }
    </script>
</body>
</html>
